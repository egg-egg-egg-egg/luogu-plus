<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>SW Keepalive 原型</title>
  <style>
    body {
      width: 360px;
      font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
      margin: 0;
      padding: 14px 16px;
      font-size: 13px;
      color: #222;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 10px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .status {
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      background: #eee;
    }
    .status.idle { background: #eceff1; color: #555; }
    .status.running { background: #fff3cd; color: #856404; }
    .status.completed { background: #d4edda; color: #155724; }
    button {
      padding: 5px 12px;
      border: 1px solid #888;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    .progress-wrap {
      background: #eee;
      border-radius: 4px;
      height: 16px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .progress-bar {
      background: #1a73e8;
      height: 100%;
      width: 0%;
      transition: width 0.2s ease;
    }
    .count { color: #555; margin-bottom: 10px; }
    .logs {
      height: 160px;
      overflow-y: auto;
      background: #fafafa;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 6px 8px;
      font-family: Consolas, Menlo, monospace;
      font-size: 11px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .hint { color: #888; font-size: 11px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>SW Keepalive 原型</h1>

  <div class="row">
    <span>状态：</span>
    <span id="status" class="status idle">idle</span>
    <span style="flex:1"></span>
    <button id="resetBtn">重置</button>
    <button id="startBtn" class="primary">启动任务</button>
  </div>

  <div class="progress-wrap"><div id="progressBar" class="progress-bar"></div></div>
  <div id="count" class="count">0 / 20</div>

  <div class="logs" id="logs"></div>

  <div class="hint">关闭 popup 不影响后台任务；SW 被杀后会自动断点续传。</div>

  <script src="popup.js"></script>
</body>
</html>
